<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Ninja - Birthday Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(26, 26, 46, 0.9); color: white; text-align: center; z-index: 10; }
        #intro-text { font-size: 28px; font-weight: bold; padding: 20px; text-shadow: 0 4px 15px rgba(0,255,135,0.5); opacity: 1; transition: opacity 1s; }
        #hud { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; z-index: 5; text-shadow: 0 2px 4px rgba(0,0,0,0.5); display: none; }
        .hidden { display: none !important; }
        button { padding: 15px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; background: #ff6b81; color: white; margin-top: 20px; box-shadow: 0 4px 15px rgba(255,107,129,0.4); transition: 0.2s; }
        button:hover { background: #ff4757; transform: scale(1.05); }
        .next-btn { background: #00ff87; color: #1a1a2e; box-shadow: 0 4px 15px rgba(0,255,135,0.4); }
        .next-btn:hover { background: #00d4ff; }
    </style>
</head>
<body>

    <div id="hud">Score: <span id="scoreVal">0</span>/10 | Missed: <span id="missVal">0</span>/3</div>

    <div id="intro-screen" class="overlay">
        <div id="intro-text">I remember someone was good at fruit ninja... let's find out!</div>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h1 style="color: #ff4757; font-size: 40px;">Game Over</h1>
        <p>You missed too many fruits!</p>
        <button onclick="resetGame()">Retry</button>
    </div>

    <div id="win-screen" class="overlay hidden">
        <h1 style="color: #00ff87; font-size: 32px; padding: 0 20px; line-height: 1.4;">
             as expected tu to haar he nahi sakti XD
        </h1>
        <button class="next-btn" onclick="goToNextPage()">Next ➡️</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const introScreen = document.getElementById('intro-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const winScreen = document.getElementById('win-screen');
    const hud = document.getElementById('hud');
    const scoreVal = document.getElementById('scoreVal');
    const missVal = document.getElementById('missVal');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    let fruits = [], bladePath = [], isSwiping = false, score = 0, misses = 0, gameState = 'INTRO', spawnInterval = null, loopRunning = false;
    const fruitEmojis = ['🍉', '🍎', '🍌', '🥝', '🥭', '🍍', '🍑', '🍓'];

    class Fruit {
        constructor() {
            this.r = Math.random() * 15 + 35;
            this.x = Math.random() * (canvas.width - this.r * 2) + this.r;
            this.y = canvas.height + this.r;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = -(Math.random() * 5 + 13);
            this.emoji = fruitEmojis[Math.floor(Math.random() * fruitEmojis.length)];
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            this.sliced = false;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += 0.22; this.rotation += this.rotationSpeed; }
        draw() {
            if (this.sliced) return;
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
            ctx.font = (this.r * 2) + "px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(this.emoji, 0, 0); ctx.restore();
        }
    }

    function spawnFruit() { if (gameState === 'PLAYING') fruits.push(new Fruit()); }

    function startGame() {
        hud.style.display = 'block';
        gameState = 'PLAYING';
        if (spawnInterval) clearInterval(spawnInterval);
        spawnInterval = setInterval(spawnFruit, 1000);
        if (!loopRunning) { loopRunning = true; gameLoop(); }
    }

    function resetGame() {
        score = 0; misses = 0; fruits = []; bladePath = [];
        scoreVal.innerText = score; missVal.innerText = misses;
        gameOverScreen.classList.add('hidden');
        winScreen.classList.add('hidden');
        loopRunning = false;
        startGame();
    }

    function goToNextPage() { window.location.href = "page3.html"; }

    function trackSwipe(x, y) {
        if (!isSwiping || gameState !== 'PLAYING') return;
        bladePath.push({x, y}); if (bladePath.length > 10) bladePath.shift();
        for (let i = 0; i < fruits.length; i++) {
            let f = fruits[i];
            if (!f.sliced) {
                let dist = Math.hypot(f.x - x, f.y - y);
                if (dist < f.r + 15) { f.sliced = true; score++; scoreVal.innerText = score; if (score >= 10) endGame('WIN'); }
            }
        }
    }

    canvas.addEventListener('mousedown', (e) => { isSwiping = true; bladePath = []; trackSwipe(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', (e) => trackSwipe(e.clientX, e.clientY));
    window.addEventListener('mouseup', () => { isSwiping = false; bladePath = []; });
    canvas.addEventListener('touchstart', (e) => { isSwiping = true; bladePath = []; trackSwipe(e.touches[0].clientX, e.touches[0].clientY); });
    canvas.addEventListener('touchmove', (e) => { trackSwipe(e.touches[0].clientX, e.touches[0].clientY); });
    window.addEventListener('touchend', () => { isSwiping = false; bladePath = []; });

    function gameLoop() {
        if (gameState !== 'PLAYING') { loopRunning = false; return; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = fruits.length - 1; i >= 0; i--) {
            let f = fruits[i]; f.update(); f.draw();
            if (f.y > canvas.height + f.r && f.vy > 0 && !f.sliced) {
                fruits.splice(i, 1); misses++; missVal.innerText = misses; if (misses >= 3) endGame('LOSE');
            }
        }
        if (isSwiping && bladePath.length > 1) {
            ctx.beginPath(); ctx.moveTo(bladePath[0].x, bladePath[0].y);
            for (let i = 1; i < bladePath.length; i++) ctx.lineTo(bladePath[i].x, bladePath[i].y);
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff'; ctx.stroke(); ctx.shadowBlur = 0;
        }
        requestAnimationFrame(gameLoop);
    }

    function endGame(result) {
        gameState = result;
        clearInterval(spawnInterval);
        spawnInterval = null;
        loopRunning = false;
        if (result === 'WIN') winScreen.classList.remove('hidden');
        else gameOverScreen.classList.remove('hidden');
    }

    setTimeout(() => {
        introScreen.style.opacity = '0';
        setTimeout(() => { introScreen.classList.add('hidden'); startGame(); }, 1000);
    }, 6000);
</script>
</body>
</html>
